<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩潛意識心理測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .color-item { transition: all 0.3s ease; }
        .color-item:active { transform: scale(0.98); }
        .selected-ring { border: 4px solid #4f46e5 !important; }
        .badge-number {
            background-color: #4f46e5;
            color: white;
            border-radius: 9999px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div class="max-w-xl mx-auto min-h-screen flex flex-col">
        <header class="p-6 pt-10 text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">色彩潛意識測驗</h1>
            <p class="text-slate-700 text-sm">順序選出 4 個你最喜歡的顏色</p>
        </header>

        <main id="selection-area" class="flex-grow px-6 pb-10">
            <div id="step-indicator" class="mb-6 bg-indigo-50 border border-indigo-100 rounded-2xl p-4 text-center">
                <p class="text-indigo-700 font-medium">請選取第 <span id="current-step" class="text-2xl font-bold">1</span> 個顏色</p>
            </div>

            <div class="space-y-3" id="color-list">
                </div>

            <div id="action-area" class="mt-10 hidden space-y-4">
                <button id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all">
                    查看解析結果
                </button>
                <button id="reset-btn" class="w-full text-slate-400 font-medium py-2 text-sm hover:text-slate-600 transition">
                    清空重選
                </button>
            </div>
        </main>

        <section id="result-area" class="hidden px-6 pb-20">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold text-slate-900">你的解析報告</h2>
                <button id="play-again-btn" class="text-indigo-600 font-bold text-sm bg-indigo-50 px-4 py-2 rounded-lg">再測一次</button>
            </div>
            <div id="results-container" class="space-y-6">
                </div>
        </section>
    </div>

    <script>
        const colorData = {
            "白色": { hex: "#FFFFFF", text: "text-slate-700", border: "border-slate-200", answers: ["情感表現比較豐富，內心柔軟且敏感，容易有情緒化的現象。", "常會在不知不覺的時候，有孩子氣耍賴，無形之中得罪別人。", "容易因為失敗的經驗而卻步，過於消極的想法拖著後腿。", "找尋會引領你的好搭檔，一同往新的事物、方向挑戰。"] },
            "紅色": { hex: "#EF4444", text: "text-white", border: "border-transparent", answers: ["勝負欲極強，且有著不服輸的個性，活力滿滿。", "容易執著在過去的事情，太過功利主義容易阻礙自身發展。", "擁有強大的自信和幹勁，相信一切事情都能辦好。", "試著去做別人不敢做的事，以積極的態度面對。"] },
            "橘色": { hex: "#F97316", text: "text-white", border: "border-transparent", answers: ["喜歡穩定的事物，不喜歡冒險，是一個謹慎且有責任心的人。", "因過份在意他人的想法，而不敢說出自己的主意。", "對於慾望控制得宜，透過冷靜的面對事物，順暢處理各事。", "容易因為心情而影響狀態，務必控制調節好自己的情緒。"] },
            "黃色": { hex: "#FACC15", text: "text-slate-800", border: "border-transparent", answers: ["性格沉穩且冷靜，一旦想做，會很有毅力且主動積極。", "對瑣事過分謹慎，容易把小細節放大，造成時間浪費。", "面對困難也會明智的思考，優秀處理表現展現在大眾面前。", "好好發揮出自己的個性，你擁有強大的適應力。"] },
            "綠色": { hex: "#22C55E", text: "text-white", border: "border-transparent", answers: ["具有理性判斷能力，行動直爽，具有良好的領導能力。", "拖延症嚴重，常把應該做的事，拖到最後一刻才完成。", "對事情有自己的判斷，做事懂得適可而止。", "適當跨出步伐，走出舒適圈。"] },
            "藍色": { hex: "#3B82F6", text: "text-white", border: "border-transparent", answers: ["外表冷酷，內心溫暖的人，對人溫柔，但容易感到孤獨。", "太熱衷於別人的事，期望別人對你的認可。", "對任何東西都無法產生慾望，有一種提不起勁的感覺。", "多嘗試不同的興趣及職業，展現你的才能。"] },
            "紫色": { hex: "#A855F7", text: "text-white", border: "border-transparent", answers: ["具有與生俱來的性格魅力，個性開朗。", "不順心的狀況特別多，總會有許多阻礙擋著。", "表面無所謂，其實內心壓力很大，特別敏感。", "多多與人合作，更能發揮你的創意性。"] }
        };

        const stages = ["第一個顏色：潛在性格", "第二個顏色：目前障礙", "第三個顏色：心理狀態", "第四個顏色：建議方向"];
        let selected = [];

        function render() {
            const list = document.getElementById('color-list');
            list.innerHTML = '';
            Object.keys(colorData).forEach(name => {
                const info = colorData[name];
                const index = selected.indexOf(name);
                const isSelected = index !== -1;

                const row = document.createElement('div');
                row.className = `color-item flex items-center justify-between p-5 rounded-2xl cursor-pointer shadow-sm border-2 ${info.border} ${isSelected ? 'opacity-50' : 'bg-white'}`;
                row.style.backgroundColor = isSelected ? '#f1f5f9' : info.hex;
                if (!isSelected) row.classList.add(info.text);
                
                row.innerHTML = `
                    <span class="text-lg font-bold">${name}</span>
                    ${isSelected ? `<div class="badge-number">${index + 1}</div>` : '<div class="w-8 h-8 rounded-full border-2 border-slate-200"></div>'}
                `;
                
                row.onclick = () => {
                    if (isSelected) {
                        selected = selected.filter(n => n !== name);
                    } else if (selected.length < 4) {
                        selected.push(name);
                    }
                    render();
                };
                list.appendChild(row);
            });

            const step = document.getElementById('current-step');
            const action = document.getElementById('action-area');
            step.innerText = selected.length + 1;
            
            if (selected.length === 4) {
                document.getElementById('step-indicator').classList.add('bg-green-50', 'border-green-100');
                document.getElementById('step-indicator').innerHTML = '<p class="text-green-700 font-bold">選取完成！請點擊下方按鈕</p>';
                action.classList.remove('hidden');
            } else {
                document.getElementById('step-indicator').className = 'mb-6 bg-indigo-50 border-indigo-100 rounded-2xl p-4 text-center';
                document.getElementById('step-indicator').innerHTML = `<p class="text-indigo-700 font-medium">請選取第 <span id="current-step" class="text-2xl font-bold">${selected.length + 1}</span> 個顏色</p>`;
                action.classList.add('hidden');
            }
        }

        document.getElementById('submit-btn').onclick = () => {
            document.getElementById('selection-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            window.scrollTo(0, 0);
            
            const container = document.getElementById('results-container');
            container.innerHTML = '';
            selected.forEach((name, i) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden";
                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-2 h-full" style="background-color: ${colorData[name].hex}"></div>
                    <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">${stages[i]}</h3>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-xl font-bold text-slate-800">${name}</span>
                    </div>
                    <p class="text-slate-600 leading-relaxed text-sm">${colorData[name].answers[i]}</p>
                `;
                container.appendChild(card);
            });
        };

        const reset = () => { selected = []; render(); document.getElementById('selection-area').classList.remove('hidden'); document.getElementById('result-area').classList.add('hidden'); };
        document.getElementById('reset-btn').onclick = reset;
        document.getElementById('play-again-btn').onclick = reset;

        render();
    </script>
</body>
</html>
